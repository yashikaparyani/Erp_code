name: Frontend CI

on:
  push:
    paths:
      - 'erp_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'erp_frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erp_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: erp_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          FRAPPE_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Run smoke routes
        run: npx vitest run src/__tests__/smoke-routes.test.ts
